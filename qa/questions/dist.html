<div class="q-card bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 fade-in" id="q31" data-cat="dist" data-num="Q31" data-title="Saga和TCC的区别？" data-ans="Saga TCC Try Confirm Cancel 回滚 长事务 本地事务">

  <div class="answer-content" id="ans-q31"><div class="px-5 pb-5 space-y-3"><div class="text-sm leading-relaxed prose dark:prose-invert max-w-none">
    <table class="w-full text-sm border-collapse border border-gray-300 dark:border-gray-600 mt-2"><tr class="bg-gray-100 dark:bg-gray-700"><th class="border border-gray-300 dark:border-gray-600 px-3 py-1.5">方案</th><th class="border border-gray-300 dark:border-gray-600 px-3 py-1.5">原理</th><th class="border border-gray-300 dark:border-gray-600 px-3 py-1.5">特点</th></tr><tr><td class="border border-gray-300 dark:border-gray-600 px-3 py-1.5"><strong>Saga</strong></td><td class="border border-gray-300 dark:border-gray-600 px-3 py-1.5">长事务拆成多个本地短事务，每个有回滚操作</td><td class="border border-gray-300 dark:border-gray-600 px-3 py-1.5">无隔离性，性能好，适合流程长的场景</td></tr><tr><td class="border border-gray-300 dark:border-gray-600 px-3 py-1.5"><strong>TCC</strong></td><td class="border border-gray-300 dark:border-gray-600 px-3 py-1.5">Try（预留）→ Confirm（确认）→ Cancel（取消）</td><td class="border border-gray-300 dark:border-gray-600 px-3 py-1.5">有隔离性，实现复杂</td></tr></table>
